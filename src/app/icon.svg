<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Ball base -->
  <circle cx="16" cy="16" r="15" fill="#FFDF00" stroke="#006B2B" stroke-width="1.5"/>

  <!-- Classic football pentagon pattern (center pentagon + surrounding patches) -->
  <!-- Center pentagon (dark green) -->
  <polygon points="16,9 20.5,12.5 18.8,18 13.2,18 11.5,12.5" fill="#006B2B"/>

  <!-- Top patch -->
  <polygon points="16,2.5 19.5,5.5 18.5,9 13.5,9 12.5,5.5" fill="#006B2B"/>

  <!-- Top-right patch -->
  <polygon points="22,5 26,8 25.5,12.5 20.5,12.5 19.5,9" fill="#006B2B"/>

  <!-- Bottom-right patch -->
  <polygon points="25.5,12.5 29,16 27,20.5 22,20 18.8,18" fill="#006B2B"/>

  <!-- Bottom-left patch -->
  <polygon points="13.2,18 9,20 7,15.5 10.5,12.5 11.5,12.5" fill="#006B2B" opacity="0.9"/>

  <!-- Top-left patch -->
  <polygon points="12.5,5.5 13.5,9 11.5,12.5 7,11 8,6.5" fill="#006B2B"/>

  <!-- Outer ring -->
  <circle cx="16" cy="16" r="15" fill="none" stroke="#006B2B" stroke-width="1.5"/>
</svg>
